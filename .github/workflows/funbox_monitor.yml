name: Funbox 商品 Monitor

on:
  workflow_dispatch:   # 由 cron-job.org 透過 GitHub API 觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-funbox-${{ runner.os }}

      - name: Install Python dependencies
        run: pip install -r funbox_monitor/requirements.txt

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('funbox_monitor/requirements.txt') }}

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Restore seen products state
        uses: actions/cache@v4
        with:
          path: funbox_monitor/seen_products.json
          key: funbox-seen-${{ github.run_id }}
          restore-keys: |
            funbox-seen-

      - name: Run Funbox monitor (50 rounds)
        env:
          GMAIL_SENDER:     ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:   ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENTS: ${{ secrets.GMAIL_RECIPIENTS }}
          FUNBOX_EMAIL:     ${{ secrets.FUNBOX_EMAIL }}
          FUNBOX_PASSWORD:  ${{ secrets.FUNBOX_PASSWORD }}
          CHECK_ROUNDS:     '50'
          STATE_FILE:       'seen_products.json'
        working-directory: funbox_monitor
        run: python funbox_monitor.py
